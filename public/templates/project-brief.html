<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Brief</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 60px 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      border-bottom: 3px solid #1a1a1a;
      padding-bottom: 30px;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .logo em {
      font-style: normal;
      display: block;
      font-size: 0.65rem;
      color: #8e8e93;
      letter-spacing: 0.2em;
      margin-top: 4px;
    }
    .meta {
      margin-top: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .meta-item {
      font-size: 0.85rem;
    }
    .meta-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8e8e93;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 1rem;
      color: #8e8e93;
    }
    .section {
      margin-bottom: 35px;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8e8e93;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e5e5;
    }
    .section-body {
      font-size: 0.95rem;
      color: #333;
      line-height: 1.8;
    }
    .section-body p {
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    ul {
      list-style: none;
      padding-left: 0;
    }
    ul li {
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
      font-size: 0.9rem;
    }
    ul li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: #1a1a1a;
      font-weight: 700;
    }
    .footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #e5e5e5;
      font-size: 0.75rem;
      color: #8e8e93;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      Synthos
      <em>Creative Intelligence</em>
    </div>
    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">Client</div>
        <div id="client">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Company</div>
        <div id="company">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Industry</div>
        <div id="industry">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Contact</div>
        <div id="contact">—</div>
      </div>
    </div>
  </div>

  <h1 id="title">Project Brief</h1>
  <p class="subtitle">Strategic foundation for the creative project</p>

  <div class="section">
    <div class="section-title">Business Objective</div>
    <div class="section-body" id="businessObjective">—</div>
  </div>

  <div class="section">
    <div class="section-title">Audience</div>
    <div class="section-body" id="audience">—</div>
  </div>

  <div class="section">
    <div class="section-title">Brand Context</div>
    <div class="section-body" id="brand">—</div>
  </div>

  <div class="section">
    <div class="section-title">Creative Direction</div>
    <div class="section-body" id="direction">—</div>
  </div>

  <div class="section">
    <div class="grid">
      <div>
        <div class="section-title">Deliverables</div>
        <ul id="deliverables">—</ul>
      </div>
      <div>
        <div class="section-title">Timeline</div>
        <div class="section-body" id="timeline">—</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Budget</div>
    <div class="section-body" id="budget">—</div>
  </div>

  <div class="section">
    <div class="section-title">Context</div>
    <div class="section-body" id="context">—</div>
  </div>

  <div class="footer">
    Synthos Creative Intelligence · synthos.studio
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fields = ['client', 'company', 'industry', 'contact', 'title', 'businessObjective', 'audience', 'brand', 'direction', 'timeline', 'budget', 'context'];
    fields.forEach(f => {
      const el = document.getElementById(f);
      if (el && params.get(f)) el.textContent = params.get(f);
    });
    const deliverablesEl = document.getElementById('deliverables');
    const deliverables = params.get('deliverables');
    if (deliverablesEl && deliverables) {
      try {
        const items = JSON.parse(deliverables);
        deliverablesEl.innerHTML = items.map((d: string) => `<li>${d}</li>`).join('');
      } catch (e) {}
    }
  </script>
</body>
</html>

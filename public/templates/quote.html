<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 60px 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      border-bottom: 3px solid #1a1a1a;
      padding-bottom: 30px;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .logo em {
      font-style: normal;
      display: block;
      font-size: 0.65rem;
      color: #8e8e93;
      letter-spacing: 0.2em;
      margin-top: 4px;
    }
    .meta {
      margin-top: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .meta-item {
      font-size: 0.85rem;
    }
    .meta-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8e8e93;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 1rem;
      color: #8e8e93;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th {
      text-align: left;
      padding: 12px 0;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8e8e93;
      border-bottom: 2px solid #1a1a1a;
    }
    td {
      padding: 16px 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #e5e5e5;
    }
    td:last-child, th:last-child {
      text-align: right;
    }
    td:nth-child(2) {
      color: #8e8e93;
      font-size: 0.85rem;
    }
    .totals {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      width: 300px;
      padding: 8px 0;
      font-size: 0.9rem;
    }
    .total-row.grand {
      border-top: 2px solid #1a1a1a;
      margin-top: 8px;
      padding-top: 12px;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .terms-box {
      margin-top: 40px;
      padding: 24px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
    }
    .terms-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8e8e93;
      margin-bottom: 10px;
    }
    .terms-text {
      font-size: 0.9rem;
      color: #555;
    }
    .footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #e5e5e5;
      font-size: 0.75rem;
      color: #8e8e93;
      text-align: center;
    }
    @media print {
      body { padding: 40px 30px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      Synthos
      <em>Creative Intelligence</em>
    </div>
    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">Client</div>
        <div id="client">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Date</div>
        <div id="date">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Project</div>
        <div id="project">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Valid Until</div>
        <div id="validUntil">—</div>
      </div>
    </div>
  </div>

  <h1>Quote</h1>
  <p class="subtitle">Detailed breakdown of services and investment</p>

  <table>
    <thead>
      <tr>
        <th style="width: 50%">Service</th>
        <th style="width: 30%">Description</th>
        <th style="width: 10%">Qty</th>
        <th style="width: 20%">Rate</th>
      </tr>
    </thead>
    <tbody id="services">
      <tr>
        <td colspan="4" style="text-align: center; color: #8e8e93; padding: 40px;">No services added</td>
      </tr>
    </tbody>
  </table>

  <div class="totals">
    <div class="total-row">
      <span>Subtotal</span>
      <span id="subtotal">—</span>
    </div>
    <div class="total-row">
      <span>Discount</span>
      <span id="discount">—</span>
    </div>
    <div class="total-row">
      <span>Tax</span>
      <span id="tax">—</span>
    </div>
    <div class="total-row grand">
      <span>Total</span>
      <span id="total">—</span>
    </div>
  </div>

  <div class="terms-box">
    <div class="terms-title">Payment Terms</div>
    <div class="terms-text" id="paymentTerms">—</div>
  </div>

  <div class="footer">
    Synthos Creative Intelligence · synthos.studio
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fields = ['client', 'date', 'project', 'validUntil', 'subtotal', 'discount', 'tax', 'total', 'paymentTerms'];
    fields.forEach(f => {
      const el = document.getElementById(f);
      if (el && params.get(f)) el.textContent = params.get(f);
    });
    const servicesEl = document.getElementById('services');
    const servicesParam = params.get('services');
    if (servicesEl && servicesParam) {
      try {
        const services = JSON.parse(servicesParam);
        servicesEl.innerHTML = services.map((s: any) => `
          <tr>
            <td><strong>${s.name || ''}</strong></td>
            <td>${s.desc || ''}</td>
            <td>${s.qty || 1}</td>
            <td>$${(s.rate || 0).toLocaleString()}</td>
          </tr>
        `).join('');
      } catch (e) {
        servicesEl.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #8e8e93;">Invalid services data</td></tr>';
      }
    }
  </script>
</body>
</html>
